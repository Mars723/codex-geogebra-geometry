name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository and packaged GeoGebra example
        run: python3 scripts/validate_repository.py

      - name: Check JavaScript syntax
        run: |
          node --check plugins/geogebra-geometry/skills/generate-geogebra-geometry/scripts/build_geogebra.mjs
          node --check plugins/geogebra-geometry/skills/generate-geogebra-geometry/scripts/emit_tikz.mjs
